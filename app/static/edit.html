<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>翻訳結果 編集 — 自動吹き替え（EN⇄JA）</title>
<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --success: #16a34a;
    --error: #dc2626;
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--primary); color: #fff; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.1rem; font-weight: 700; }
  header .job-id { opacity: .75; font-size: .85rem; }
  .toolbar { background: #fff; border-bottom: 1px solid var(--border); padding: .75rem 1.5rem; display: flex; gap: .75rem; align-items: center; flex-wrap: wrap; }
  button {
    background: var(--primary); color: #fff; border: none; border-radius: 8px;
    padding: .5rem 1.1rem; font-size: .875rem; font-weight: 600; cursor: pointer;
    transition: background .15s;
  }
  button:hover { background: var(--primary-dark); }
  button:disabled { background: #94a3b8; cursor: not-allowed; }
  .btn-success { background: var(--success); }
  .btn-success:hover { background: #15803d; }
  .btn-outline { background: transparent; color: var(--primary); border: 1.5px solid var(--primary); }
  .btn-outline:hover { background: #eff6ff; }
  #save-msg { font-size: .875rem; color: var(--success); font-weight: 500; }
  main { max-width: 900px; margin: 1.5rem auto; padding: 0 1rem 4rem; }
  .seg-row {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem; margin-bottom: .75rem; display: grid;
    grid-template-columns: 90px 1fr 1fr 60px; gap: .75rem; align-items: start;
  }
  .seg-row:hover { border-color: #93c5fd; }
  .time-cell { color: var(--muted); font-size: .8rem; line-height: 1.6; padding-top: .35rem; }
  .en-text { font-size: .875rem; color: var(--muted); background: #f8fafc; border-radius: 6px; padding: .5rem .75rem; line-height: 1.55; }
  textarea {
    width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: .5rem .75rem;
    font-size: .875rem; font-family: inherit; resize: vertical; min-height: 60px; color: var(--text);
    line-height: 1.55;
  }
  textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px #dbeafe; }
  .del-btn {
    background: transparent; color: #e11d48; border: 1.5px solid #fecdd3;
    border-radius: 6px; padding: .3rem .5rem; font-size: .8rem; font-weight: 600; cursor: pointer;
  }
  .del-btn:hover { background: #fff1f2; }
  .loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 1rem; }
  .info-bar { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: .75rem 1rem; font-size: .875rem; color: #1d4ed8; margin-bottom: 1.25rem; }
  .speaker-chip {
    display: inline-block; background: #f1f5f9; color: var(--muted); border-radius: 6px;
    padding: .1rem .5rem; font-size: .72rem; font-weight: 600; margin-bottom: .35rem;
  }
  #speaker-voice-card {
    display: none; background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem 1.25rem; margin-bottom: 1.25rem;
  }
  #speaker-voice-card h2 { font-size: .95rem; margin-bottom: .75rem; }
  .speaker-voice-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .6rem; }
  .speaker-voice-row label { margin: 0; min-width: 140px; color: var(--text); font-weight: 600; font-size: .85rem; }
  .speaker-voice-row select { margin-bottom: 0; max-width: 260px; }
</style>
</head>
<body>
<header>
  <h1>📝 翻訳結果 確認・編集</h1>
  <span class="job-id" id="job-badge"></span>
</header>

<div class="toolbar">
  <button onclick="saveSegments()">💾 保存</button>
  <button class="btn-success" onclick="runPipeline()">▶ この内容で吹き替え生成</button>
  <button class="btn-outline" onclick="window.close()">← 戻る</button>
  <span id="save-msg"></span>
</div>

<main>
  <div class="info-bar">
    各行の <strong>翻訳結果</strong> を自由に編集できます。保存後「吹き替え生成」を押すと、編集内容で音声合成されます。
  </div>

  <div id="speaker-voice-card">
    <h2>🗣️ 話者別ボイス設定（話者交代時に自動で音声を切り替え）</h2>
    <div id="speaker-voice-list"></div>
  </div>

  <div id="segment-list"><div class="loading">セグメントを読み込み中...</div></div>
</main>

<script>
  const params  = new URLSearchParams(location.search);
  const jobId   = params.get('job');
  let segments  = [];
  let sourceSegments = {};
  let speakerVoiceMap = {}; // { "SPEAKER_00": "voicevox:female", ... }
  let targetLang = 'ja';

  // 方向ごとの選択可能ボイス（value はエンジン込み。ja=VOICEVOX/edge, en=edgeのみ）
  const VOICE_SETS = {
    ja: [
      { value: 'voicevox:female',  label: 'ずんだもん（VOICEVOX）' },
      { value: 'voicevox:male',    label: '玄野武宏（VOICEVOX）' },
      { value: 'voicevox:female2', label: '春日部つむぎ（VOICEVOX）' },
      { value: 'voicevox:male2',   label: '四国めたん（VOICEVOX）' },
      { value: 'edge:female',      label: '女性 Nanami（edge-tts）' },
      { value: 'edge:male',        label: '男性 Keita（edge-tts）' },
    ],
    en: [
      { value: 'female',  label: 'Aria (US, edge-tts)' },
      { value: 'male',    label: 'Guy (US, edge-tts)' },
      { value: 'female2', label: 'Sonia (UK, edge-tts)' },
      { value: 'male2',   label: 'Ryan (UK, edge-tts)' },
    ],
  };
  function voiceSet() { return VOICE_SETS[targetLang] || VOICE_SETS.ja; }

  if (!jobId) {
    document.getElementById('segment-list').innerHTML = '<div class="loading">Job ID が指定されていません。</div>';
  } else {
    document.getElementById('job-badge').textContent = 'Job: ' + jobId;
    loadSegments();
  }

  async function loadSegments() {
    // 翻訳先の言語を取得（ボイス表示ラベルの切り替えに使う）
    const dirRes = await fetch(`/jobs/${jobId}/direction`).catch(() => null);
    if (dirRes && dirRes.ok) {
      const dir = await dirRes.json();
      targetLang = dir.target_lang || 'ja';
    }

    // 翻訳済みセグメント
    const res = await fetch(`/jobs/${jobId}/segments`);
    if (!res.ok) {
      document.getElementById('segment-list').innerHTML = '<div class="loading">セグメントが見つかりません。</div>';
      return;
    }
    segments = await res.json();

    // 原文セグメント（参照用）
    const srcRes = await fetch(`/jobs/${jobId}/segments_source`).catch(() => null);
    if (srcRes && srcRes.ok) {
      const srcList = await srcRes.json();
      srcList.forEach(s => { sourceSegments[s.start] = s.text; });
    }

    // 話者一覧（複数話者が検出された場合のみ設定パネルを表示）
    const spRes = await fetch(`/jobs/${jobId}/speakers`).catch(() => null);
    if (spRes && spRes.ok) {
      const { speakers } = await spRes.json();
      renderSpeakerVoiceCard(speakers || []);
    }

    renderSegments();
  }

  function renderSpeakerVoiceCard(speakers) {
    if (!speakers.length) return;

    const options = voiceSet();
    speakers.forEach((sp, i) => {
      speakerVoiceMap[sp] = options[i % options.length].value;
    });

    const card = document.getElementById('speaker-voice-card');
    const list = document.getElementById('speaker-voice-list');

    if (speakers.length <= 1) {
      // 単一話者のみ検出された場合は従来どおり（設定パネル不要）
      card.style.display = 'none';
      return;
    }

    card.style.display = '';
    list.innerHTML = speakers.map(sp => `
      <div class="speaker-voice-row">
        <label>${escHtml(sp)}</label>
        <select data-speaker="${escHtml(sp)}" onchange="onSpeakerVoiceChange(this)">
          ${options.map(o => `<option value="${o.value}" ${o.value === speakerVoiceMap[sp] ? 'selected' : ''}>${o.label}</option>`).join('')}
        </select>
      </div>
    `).join('');
  }

  function onSpeakerVoiceChange(select) {
    speakerVoiceMap[select.dataset.speaker] = select.value;
  }

  function fmtTime(sec) {
    const m = Math.floor(sec / 60).toString().padStart(2, '0');
    const s = (sec % 60).toFixed(1).padStart(4, '0');
    return `${m}:${s}`;
  }

  function renderSegments() {
    const list = document.getElementById('segment-list');
    list.innerHTML = '';
    segments.forEach((seg, i) => {
      const srcText = sourceSegments[seg.start] || '';
      const row = document.createElement('div');
      row.className = 'seg-row';
      const speakerBadge = seg.speaker
        ? `<span class="speaker-chip">${escHtml(seg.speaker)}</span><br>`
        : '';
      row.innerHTML = `
        <div class="time-cell">
          ${speakerBadge}${fmtTime(seg.start)}<br>→ ${fmtTime(seg.end)}
        </div>
        <div class="en-text">${escHtml(srcText || '（原文なし）')}</div>
        <textarea data-idx="${i}" rows="3">${escHtml(seg.text)}</textarea>
        <button class="del-btn" onclick="deleteRow(${i})">削除</button>
      `;
      list.appendChild(row);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function deleteRow(idx) {
    segments.splice(idx, 1);
    renderSegments();
    showSaveMsg('行を削除しました（未保存）');
  }

  function collectEdits() {
    document.querySelectorAll('textarea[data-idx]').forEach(ta => {
      const i = parseInt(ta.dataset.idx);
      if (segments[i]) segments[i].text = ta.value;
    });
  }

  async function saveSegments() {
    collectEdits();
    const res = await fetch(`/jobs/${jobId}/segments`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(segments),
    });
    if (res.ok) {
      showSaveMsg('✅ 保存しました');
    } else {
      showSaveMsg('❌ 保存失敗');
    }
  }

  async function runPipeline() {
    await saveSegments();
    const speakers = Object.keys(speakerVoiceMap);
    const fallbackVoice = speakers.length ? speakerVoiceMap[speakers[0]] : voiceSet()[0].value;

    const fd = new FormData();
    fd.append('voice', fallbackVoice);
    fd.append('subtitle', 'true');
    if (speakers.length > 1) {
      fd.append('speaker_voice_map', JSON.stringify(speakerVoiceMap));
    }
    const res = await fetch(`/jobs/${jobId}/run`, { method: 'POST', body: fd });
    if (res.ok) {
      alert('処理を開始しました。メイン画面で進捗を確認してください。');
      window.close();
    } else {
      alert('処理開始に失敗しました');
    }
  }

  function showSaveMsg(msg) {
    const el = document.getElementById('save-msg');
    el.textContent = msg;
    setTimeout(() => { el.textContent = ''; }, 3000);
  }
</script>
</body>
</html>
